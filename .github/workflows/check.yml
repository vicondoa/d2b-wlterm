name: check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout pinned client toolkit
        run: |
          git clone https://github.com/vicondoa/d2b-toolkit ../d2b-client-toolkit
          git -C ../d2b-client-toolkit checkout 3d6b75d47c8df66c1722ea324d64334a127d43ec
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - run: nix flake check
